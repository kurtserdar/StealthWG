name: StealthWG

options:
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig

settings:
  base:
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1" # iPhone only
    # wireguard-go is built by a Makefile-driven script phase that writes outside
    # Xcode's declared outputs, so user-script sandboxing must stay off.
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  WireGuardKit:
    path: ThirdParty/wireguard-apple

targets:
  # ── iOS application ────────────────────────────────────────────────────────
  StealthWG:
    type: application
    platform: iOS
    sources:
      - App
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stealthwg
        PRODUCT_NAME: StealthWG
        CODE_SIGN_ENTITLEMENTS: App/App.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: StealthWG
        INFOPLIST_KEY_NSCameraUsageDescription: StealthWG scans QR codes to import a VPN profile.
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: StealthWG reads your current Wi-Fi name so you can mark it a trusted network.
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    dependencies:
      - target: PacketTunnel
        embed: true
      - target: StealthWGWidgets
        embed: true

  # ── WidgetKit extension (Shortcuts surfaces + Home Screen widgets) ──────────
  StealthWGWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - StealthWGWidgets
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stealthwg.widgets
        PRODUCT_NAME: StealthWGWidgets
        CODE_SIGN_ENTITLEMENTS: StealthWGWidgets/StealthWGWidgets.entitlements
        INFOPLIST_FILE: StealthWGWidgets/Info.plist
        GENERATE_INFOPLIST_FILE: YES

  # ── Packet Tunnel network extension ────────────────────────────────────────
  PacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - Tunnel
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stealthwg.tunnel
        PRODUCT_NAME: PacketTunnel
        CODE_SIGN_ENTITLEMENTS: Tunnel/Tunnel.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Tunnel/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: StealthWG Tunnel
        # Exposes wgSetStealthKey (a C symbol from libwg-go.a) to the extension's
        # Swift without importing the internal WireGuardKitGo module.
        SWIFT_OBJC_BRIDGING_HEADER: Tunnel/StealthBridge.h
    dependencies:
      - package: WireGuardKit
        product: WireGuardKit
    preBuildScripts:
      - name: Build wireguard-go bridge
        # Builds libwg-go.a into CONFIGURATION_BUILD_DIR so the extension link
        # can resolve -lwg-go. The Makefile reads ARCHS/PLATFORM_NAME/SDKROOT and
        # the build/temp dirs from Xcode's environment.
        basedOnDependencyAnalysis: false
        script: |
          set -e
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          make -C "$SRCROOT/ThirdParty/wireguard-apple/Sources/WireGuardKitGo"

  # ── macOS menu-bar application ─────────────────────────────────────────────
  StealthWG-mac:
    type: application
    platform: macOS
    sources:
      - Shared
      - macOS
      - path: App/Views
      - path: App/TunnelManager.swift
      - path: App/DiagnosticsRunner.swift
      - path: App/Theme.swift
      - path: App/QRCodeView.swift
      - path: App/Platform.swift
    settings:
      base:
        # Distinct macOS bundle ids so the App IDs don't collide with the iOS
        # ones (which carry different, platform-specific entitlement values).
        PRODUCT_BUNDLE_IDENTIFIER: com.stealthwg.mac
        PRODUCT_NAME: StealthWG
        CODE_SIGN_ENTITLEMENTS: macOS/StealthWG-mac.entitlements
        # Notarization requires the Hardened Runtime.
        ENABLE_HARDENED_RUNTIME: YES
        # Manual Developer ID signing for notarization (Path B).
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application"
        PROVISIONING_PROFILE_SPECIFIER: "StealthWG mac"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: StealthWG
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSSystemExtensionUsageDescription: StealthWG installs a network extension to mask and route your VPN traffic.
    dependencies:
      - target: PacketTunnel-mac
        embed: true
      - package: WireGuardKit
        product: WireGuardKit

  # ── macOS packet tunnel System Extension ───────────────────────────────────
  PacketTunnel-mac:
    type: system-extension
    platform: macOS
    sources:
      - Tunnel
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stealthwg.mac.tunnel
        PRODUCT_NAME: com.stealthwg.mac.tunnel
        CODE_SIGN_ENTITLEMENTS: Tunnel/PacketTunnel-mac.entitlements
        # Notarization requires the Hardened Runtime.
        ENABLE_HARDENED_RUNTIME: YES
        # Manual Developer ID signing for notarization (Path B).
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application"
        PROVISIONING_PROFILE_SPECIFIER: "StealthWG mac tunnel"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Tunnel/Info-mac.plist
        SWIFT_OBJC_BRIDGING_HEADER: Tunnel/StealthBridge.h
    dependencies:
      - package: WireGuardKit
        product: WireGuardKit
    preBuildScripts:
      - name: Build wireguard-go bridge
        basedOnDependencyAnalysis: false
        script: |
          set -e
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          make -C "$SRCROOT/ThirdParty/wireguard-apple/Sources/WireGuardKitGo"
