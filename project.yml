name: StealthWG

options:
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig

settings:
  base:
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1" # iPhone only
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  # ── iOS application ────────────────────────────────────────────────────────
  StealthWG:
    type: application
    platform: iOS
    sources:
      - App
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stealthwg
        PRODUCT_NAME: StealthWG
        CODE_SIGN_ENTITLEMENTS: App/App.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: StealthWG
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    dependencies:
      - target: PacketTunnel
        embed: true

  # ── Packet Tunnel network extension ────────────────────────────────────────
  PacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - Tunnel
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stealthwg.tunnel
        PRODUCT_NAME: PacketTunnel
        CODE_SIGN_ENTITLEMENTS: Tunnel/Tunnel.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Tunnel/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: StealthWG Tunnel
