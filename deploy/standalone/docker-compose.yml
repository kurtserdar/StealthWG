# StealthWG standalone bundle: masking relay + bundled WireGuard server.
# One command on a WG-less Linux host: `docker compose up -d`.
services:
  wg:
    # Pulls the published image; `docker compose build` rebuilds from ./wg.
    image: ghcr.io/kurtserdar/stealthwg-wg:latest
    build: ./wg
    restart: unless-stopped
    cap_add: ["NET_ADMIN"]
    sysctls:
      net.ipv4.ip_forward: "1"
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      PUBLIC_HOST: "${PUBLIC_HOST:?set PUBLIC_HOST in .env}"
      STEALTHWG_PSK: "${STEALTHWG_PSK:-}"
      PEERS: "${PEERS:-1}"
      WG_SUBNET: "${WG_SUBNET:-10.0.0.0/24}"
      WG_DNS: "${WG_DNS:-1.1.1.1}"
    volumes:
      - ./data:/data
      - ./profiles:/profiles

  gateway:
    image: ghcr.io/kurtserdar/stealthwg-gateway:latest
    restart: unless-stopped
    depends_on:
      - wg
    ports:
      - "51819:51819/udp"
    environment:
      STEALTHWG_UPSTREAM: "wg:51820"
      STEALTHWG_PSK_FILE: "/data/psk"
    volumes:
      - ./data:/data:ro

  # Second relay on UDP 443 so a client can fall back to :443 when :51819 is
  # blocked. Same masked WireGuard, same upstream — only the port differs.
  gateway443:
    image: ghcr.io/kurtserdar/stealthwg-gateway:latest
    restart: unless-stopped
    depends_on:
      - wg
    ports:
      - "443:51819/udp"
    environment:
      STEALTHWG_UPSTREAM: "wg:51820"
      STEALTHWG_PSK_FILE: "/data/psk"
    volumes:
      - ./data:/data:ro
