# StealthWG standalone bundle: masking relay + bundled WireGuard server.
# One command on a WG-less Linux host: `docker compose up -d`.
services:
  wg:
    # Pulls the published image; `docker compose build` rebuilds from ./wg.
    image: ghcr.io/kurtserdar/stealthwg-wg:latest
    build: ./wg
    restart: unless-stopped
    cap_add: ["NET_ADMIN"]
    sysctls:
      net.ipv4.ip_forward: "1"
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      PUBLIC_HOST: "${PUBLIC_HOST:?set PUBLIC_HOST in .env}"
      STEALTHWG_PSK: "${STEALTHWG_PSK:-}"
      PEERS: "${PEERS:-1}"
      WG_SUBNET: "${WG_SUBNET:-10.0.0.0/24}"
      WG_DNS: "${WG_DNS:-1.1.1.1}"
    volumes:
      - ./data:/data
      - ./profiles:/profiles

  # One gateway, two listeners on the same upstream: the UDP mask on 51819 and
  # QUIC (HTTP/3-shaped) on 443. A client can dial either and fall back between
  # them (profile: `Endpoints = <host>:51819, quic://<host>:443`).
  gateway:
    image: ghcr.io/kurtserdar/stealthwg-gateway:latest
    restart: unless-stopped
    depends_on:
      - wg
    ports:
      - "51819:51819/udp"
      - "443:443/udp"
    environment:
      STEALTHWG_UPSTREAM: "wg:51820"
      STEALTHWG_PSK_FILE: "/data/psk"
      STEALTHWG_QUIC: ":443"
    volumes:
      - ./data:/data:ro
