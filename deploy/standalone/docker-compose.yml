# StealthWG standalone bundle — one all-in-one container: userspace WireGuard
# (wireguard-go) + masking + NAT, terminated in a single process. No host kernel
# WireGuard needed. One command on a WG-less Linux host: `docker compose up -d`.
services:
  stealthwg:
    # Pulls the published image; `docker compose build` rebuilds from the repo.
    image: ghcr.io/kurtserdar/stealthwg-allinone:latest
    build:
      context: ../..
      dockerfile: deploy/standalone/allinone/Dockerfile
    restart: unless-stopped
    cap_add: ["NET_ADMIN"]
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      net.ipv4.ip_forward: "1"
    ports:
      # The masked (or QUIC) WireGuard port. Set LISTEN=443 + TRANSPORT=quic for QUIC.
      - "${LISTEN:-51820}:${LISTEN:-51820}/udp"
    environment:
      PUBLIC_HOST: "${PUBLIC_HOST:?set PUBLIC_HOST in .env}"
      PEERS: "${PEERS:-1}"
      SUBNET: "${SUBNET:-10.8.0.0/24}"
      DNS: "${DNS:-1.1.1.1}"
      LISTEN: "${LISTEN:-51820}"
      TRANSPORT: "${TRANSPORT:-mask}"
      SNI: "${SNI:-}"
    volumes:
      - ./data:/data
